<svg width="100%" viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, system-ui, -apple-system, sans-serif">

  <defs>
    <!-- Reusable arrow marker with explicit color -->
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5"
            markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9c9a92"
            stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Subtle radial glow for the centre -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="55%">
      <stop offset="0%"  stop-color="#1e2030" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0d0f1a" stop-opacity="1"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="680" height="760" rx="12" fill="url(#bgGlow)"/>
  <!-- Subtle top line accent -->
  <rect width="680" height="3" rx="1.5" fill="#5dcaa5" opacity="0.6"/>

  <!-- ═══════════════════════════════════════════════
       STEP 1 — Raw Data  (dark grey)
  ════════════════════════════════════════════════ -->
  <rect x="220" y="26" width="240" height="56" rx="8"
        fill="#44433f" stroke="#b4b2a9" stroke-width="0.6"/>
  <text x="340" y="50" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#d3d1c7">Raw transactional data</text>
  <text x="340" y="70" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#b4b2a9">10,000 customer records (CSV)</text>

  <line x1="340" y1="82" x2="340" y2="112" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 2 — Feature Engineering  (teal)
  ════════════════════════════════════════════════ -->
  <rect x="180" y="112" width="320" height="56" rx="8"
        fill="#085041" stroke="#5dcaa5" stroke-width="0.6"/>
  <text x="340" y="136" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#9fe1cb">Feature engineering</text>
  <text x="340" y="156" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#5dcaa5">16 features: recency, frequency, revenue…</text>

  <line x1="340" y1="168" x2="340" y2="198" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 3 — Preprocessing  (teal)
  ════════════════════════════════════════════════ -->
  <rect x="180" y="198" width="320" height="56" rx="8"
        fill="#085041" stroke="#5dcaa5" stroke-width="0.6"/>
  <text x="340" y="222" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#9fe1cb">Preprocessing</text>
  <text x="340" y="242" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#5dcaa5">Scale · Encode · Train/Test split (80/20)</text>

  <line x1="340" y1="254" x2="340" y2="284" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 4 — MLP Training  (indigo/purple)
  ════════════════════════════════════════════════ -->
  <rect x="160" y="284" width="360" height="56" rx="8"
        fill="#3c3489" stroke="#afa9ec" stroke-width="0.6"/>
  <text x="340" y="308" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#cecbf6">MLP training (PyTorch)</text>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#afa9ec">128→64→32 neurons · Dropout 30% · Adam · Early stopping</text>

  <line x1="340" y1="340" x2="340" y2="370" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 5 — Evaluation  (amber)
  ════════════════════════════════════════════════ -->
  <rect x="180" y="370" width="320" height="56" rx="8"
        fill="#633806" stroke="#ef9f27" stroke-width="0.6"/>
  <text x="340" y="394" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#fac775">Evaluation + baseline comparison</text>
  <text x="340" y="414" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#ef9f27">98.4% acc · ROC-AUC 0.999 · vs XGBoost / LR / RF</text>

  <line x1="340" y1="426" x2="340" y2="456" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       STEP 6 — SHAP Explainability  (amber)
  ════════════════════════════════════════════════ -->
  <rect x="210" y="456" width="260" height="56" rx="8"
        fill="#633806" stroke="#ef9f27" stroke-width="0.6"/>
  <text x="340" y="480" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#fac775">SHAP explainability</text>
  <text x="340" y="500" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#ef9f27">Feature importance per prediction</text>

  <!-- Fan-out lines from SHAP to three deployment boxes -->
  <line x1="285" y1="512" x2="120" y2="562" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <line x1="340" y1="512" x2="340" y2="562" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <line x1="395" y1="512" x2="560" y2="562" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- "Deploy via" label -->
  <text x="340" y="548" text-anchor="middle" dominant-baseline="central"
        font-size="11" fill="#c2c0b6" letter-spacing="1">DEPLOY VIA</text>

  <!-- ═══════════════════════════════════════════════
       DEPLOYMENT — Flask  (coral/orange)
  ════════════════════════════════════════════════ -->
  <rect x="40" y="562" width="160" height="56" rx="8"
        fill="#712b13" stroke="#f0997b" stroke-width="0.6"/>
  <text x="120" y="586" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#f5c4b3">Flask REST API</text>
  <text x="120" y="606" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#f0997b">Real-time predictions</text>

  <!-- ═══════════════════════════════════════════════
       DEPLOYMENT — Streamlit  (coral/orange)
  ════════════════════════════════════════════════ -->
  <rect x="260" y="562" width="160" height="56" rx="8"
        fill="#712b13" stroke="#f0997b" stroke-width="0.6"/>
  <text x="340" y="586" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#f5c4b3">Streamlit dashboard</text>
  <text x="340" y="606" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#f0997b">Interactive UI</text>

  <!-- ═══════════════════════════════════════════════
       DEPLOYMENT — Docker  (coral/orange)
  ════════════════════════════════════════════════ -->
  <rect x="480" y="562" width="160" height="56" rx="8"
        fill="#712b13" stroke="#f0997b" stroke-width="0.6"/>
  <text x="560" y="586" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#f5c4b3">Docker</text>
  <text x="560" y="606" text-anchor="middle" dominant-baseline="central"
        font-size="12" fill="#f0997b">Cloud-ready container</text>

  <!-- Converge lines from 3 boxes → Business output -->
  <line x1="120" y1="618" x2="240" y2="660" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <line x1="340" y1="618" x2="340" y2="660" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>
  <line x1="560" y1="618" x2="440" y2="660" stroke="#9c9a92" stroke-width="1.5"
        marker-end="url(#arrow)"/>

  <!-- ═══════════════════════════════════════════════
       BUSINESS OUTPUT  (green)
  ════════════════════════════════════════════════ -->
  <rect x="160" y="660" width="360" height="40" rx="8"
        fill="#27500a" stroke="#97c459" stroke-width="0.6"/>
  <text x="340" y="680" text-anchor="middle" dominant-baseline="central"
        font-size="14" font-weight="600" fill="#c0dd97">🎯  Business action: retain at-risk customers</text>

</svg>