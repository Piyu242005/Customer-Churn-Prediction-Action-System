version: '3.8'

services:
  churn-api:
    build:
      # Build context is the project root so Dockerfile can COPY src/, serving/, artifacts/
      context: ..
      dockerfile: docker/Dockerfile
    container_name: mlp-churn-api
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - churn-network

networks:
  churn-network:
    driver: bridge
